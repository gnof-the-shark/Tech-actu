<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Actu - Tendances du moment</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
      <header class="mb-10">
        <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">Tech Actu</h1>
        <p class="mt-2 text-slate-400">Les 5 tendances technologiques générées automatiquement par IA.</p>
        <p id="updated" class="mt-2 text-sm text-slate-500"></p>
      </header>

      <section id="cards" class="grid grid-cols-1 gap-4 md:grid-cols-2"></section>

      <div id="error" class="mt-6 hidden rounded-xl border border-red-500/40 bg-red-500/10 p-4 text-red-200"></div>
    </main>

    <script>
      const cardsContainer = document.getElementById("cards");
      const updatedEl = document.getElementById("updated");
      const errorEl = document.getElementById("error");

      function cardTemplate(item, index) {
        return `
          <article class="rounded-2xl border border-slate-800 bg-slate-900/70 p-5 shadow-lg shadow-slate-950/40 transition hover:border-slate-700 hover:bg-slate-900">
            <p class="mb-2 text-xs uppercase tracking-wide text-cyan-300">#${index + 1} · ${item.source || "Tech"}</p>
            <h2 class="text-lg font-semibold text-white">${item.title}</h2>
            <p class="mt-3 text-sm leading-6 text-slate-300">${item.summary}</p>
          </article>
        `;
      }

      async function loadData() {
        try {
          const response = await fetch("./data.json", { cache: "no-store" });
          if (!response.ok) throw new Error(`Erreur HTTP ${response.status}`);

          const data = await response.json();
          const items = Array.isArray(data.items) ? data.items : [];

          if (data.updated_at) {
            const date = new Date(data.updated_at);
            updatedEl.textContent = `Dernière mise à jour : ${date.toLocaleString("fr-FR")}`;
          }

          if (!items.length) {
            cardsContainer.innerHTML = '<p class="text-slate-400">Aucune actualité disponible pour le moment.</p>';
            return;
          }

          cardsContainer.innerHTML = items.map(cardTemplate).join("");
        } catch (error) {
          errorEl.classList.remove("hidden");
          errorEl.textContent = `Impossible de charger les données (${error.message}).`;
        }
      }

      loadData();
    </script>
  </body>
</html>
